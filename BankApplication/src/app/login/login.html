<div class="min-h-screen bg-[aliceblue] flex justify-center items-start pt-16">
  <div class="w-full max-w-md bg-white rounded-lg shadow overflow-hidden">
    <!-- Header -->
    <div class="bg-green-600 text-white text-center py-3">
      <h1 class="text-lg font-semibold">Sign In</h1>
    </div>

    <!-- Body -->
    <div class="p-6">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email</mat-label>
          <input type="email" matInput formControlName="email" />
          <mat-hint>Email is required!</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input type="password" matInput formControlName="password" />
          <mat-hint>Password is required</mat-hint>
        </mat-form-field>

        <button class="ml-auto text-green-600 hover:underline cursor-pointer" type="button">
          Forgot password?
        </button>

        <button
          type="submit"
          class="w-full bg-green-600 text-white py-2 rounded-full font-semibold hover:bg-green-700 transition"
        >
          SIGN IN
        </button>

        <div class="flex flex-col items-center mt-4">
          <span class="text-gray-500 text-sm"> Don't have an account? </span>

          <button class="text-green-600 font-medium hover:underline cursor-pointer">
            SIGN UP NOW
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
